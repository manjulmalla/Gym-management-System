{% extends "base.html" %}
{% block title %}Delete Payment{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-lg-6"><div class="card p-4 text-center">
    <i class="bi bi-exclamation-triangle text-danger" style="font-size:3rem;"></i>
    <h5 class="mt-3">Delete Payment</h5>
    <p class="text-muted">Delete invoice <strong>{{ object.invoice_number }}</strong>?</p>
    <form method="post">{% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, Delete</button>
        <a href="{% url 'payments:list' %}" class="btn btn-outline-secondary">Cancel</a>
    </form>
</div></div></div>
{% endblock %}
