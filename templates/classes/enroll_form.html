{% extends "base.html" %}
{% block title %}Enroll Member{% endblock %}
{% block content %}
<h4 class="page-title mb-4">Enroll Member — {{ workout_class.name }}</h4>
<div class="row justify-content-center"><div class="col-lg-6"><div class="card p-4">
    <form method="post" novalidate>
        {% csrf_token %}
        {% for field in form %}
        <div class="mb-3">
            <label class="form-label">{{ field.label }}</label>
            {{ field }}
            {% for error in field.errors %}<div class="text-danger small">{{ error }}</div>{% endfor %}
        </div>
        {% endfor %}
        <button type="submit" class="btn btn-primary w-100">Enroll</button>
        <a href="{% url 'classes:detail' workout_class.pk %}" class="btn btn-outline-secondary w-100 mt-2">Cancel</a>
    </form>
</div></div></div>
{% endblock %}
