{% extends "base.html" %}
{% block title %}Delete User{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card p-4 text-center">
            <i class="bi bi-exclamation-triangle text-danger" style="font-size:3rem;"></i>
            <h5 class="mt-3">Delete User</h5>
            <p class="text-muted">Are you sure you want to delete <strong>{{ object }}</strong>? This cannot be undone.</p>
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Yes, Delete</button>
                <a href="{% url 'accounts:user_list' %}" class="btn btn-outline-secondary">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
