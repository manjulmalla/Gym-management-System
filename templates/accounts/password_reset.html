{% extends "base.html" %}
{% block title %}Reset Password{% endblock %}

{% block auth_content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="brand"><i class="bi bi-lightning-charge-fill"></i> GymPro</div>
        <p class="text-center text-muted mb-4">Enter your email to reset your password</p>
        <form method="post" novalidate>
            {% csrf_token %}
            {% for field in form %}
            <div class="mb-3">
                <label class="form-label">{{ field.label }}</label>
                {{ field }}
                {% for error in field.errors %}<div class="text-danger small">{{ error }}</div>{% endfor %}
            </div>
            {% endfor %}
            <button type="submit" class="btn btn-primary w-100">Send Reset Link</button>
        </form>
        <p class="text-center mt-4 mb-0 small"><a href="{% url 'accounts:login' %}" class="text-decoration-none">Back to login</a></p>
    </div>
</div>
{% endblock %}
