{% extends "base.html" %}
{% block title %}Renew Membership{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-lg-6"><div class="card p-4 text-center">
    <i class="bi bi-arrow-repeat text-success" style="font-size:3rem;"></i>
    <h5 class="mt-3">Renew Membership</h5>
    <p class="text-muted">Renew <strong>{{ membership.member.full_name }}</strong>'s <strong>{{ membership.plan.name }}</strong> plan
        for another {{ membership.plan.duration_days }} days?</p>
    <form method="post">{% csrf_token %}
        <button type="submit" class="btn btn-success">Confirm Renewal</button>
        <a href="{% url 'memberships:membership_list' %}" class="btn btn-outline-secondary">Cancel</a>
    </form>
</div></div></div>
{% endblock %}
